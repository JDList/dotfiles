# -------- Kitty Terminal Configuration --------

# Font
font_family JetBrainsMono Nerd Font
font_size 12.0

# Cursor (beam instead of block)
cursor_shape beam
cursor_beam_thickness 2
cursor_blink_interval 0

# Transparency
background_opacity 0.9

# Padding
window_padding_width 10

# Scrollback
scrollback_lines 10000

# Clipboard shortcuts (normal mappings)
map ctrl+shift+c copy_to_clipboard
map ctrl+shift+v paste_from_clipboard

# Tabs
map ctrl+shift+t new_tab
map ctrl+shift+w close_window

# Font scaling
map ctrl+shift+equal increase_font_size
map ctrl+shift+minus decrease_font_size
map ctrl+shift+0 reset_font_size


# -------- Fire-style color theme --------

foreground #ffd7a0
background #0f0a06

selection_foreground #000000
selection_background #ffb86c

cursor #ffb86c
cursor_text_color #000000

# Normal colors
color0  #1c1c1c
color1  #ff4b1f
color2  #ff9068
color3  #ffb347
color4  #d65a31
color5  #ff784f
color6  #ffa07a
color7  #f5e6d3

# Bright colors
color8  #3a3a3a
color9  #ff6a3d
color10 #ff9e6b
color11 #ffd27f
color12 #ff784f
color13 #ff9966
color14 #ffb88c
color15 #fff2e0
